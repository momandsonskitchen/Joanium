name: Hourly Model Sync

on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install virtual display
        run: sudo apt-get install -y xvfb

      - name: Run app for 30 seconds (headless)
        run: |
          xvfb-run --auto-servernum npm start &
          APP_PID=$!

          echo "App started with PID $APP_PID"
          sleep 30

          echo "Sending SIGINT (Ctrl+C) to app..."
          kill -SIGINT $APP_PID || true

          sleep 3

          kill -9 $APP_PID 2>/dev/null || true
          echo "App stopped."

      - name: Check for model config changes
        id: changes
        run: |
          git diff --quiet Config/Models && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push model updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Config/Models
          git commit -m "chore: hourly model sync [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push origin main
