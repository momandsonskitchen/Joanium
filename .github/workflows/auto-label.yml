name: 🏷️ Auto Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  issues:
    types: [opened, edited]

permissions: read-all

jobs:
  label-pr:
    name: Label Pull Requests by Path
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_target'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/labeler@8558fd74291d67161a8a6d0f6bf0551a55539527 # v5.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true

  label-issue:
    name: Label Issues by Keywords
    runs-on: ubuntu-latest
    if: github.event_name == 'issues'
    permissions:
      issues: write

    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body  = (context.payload.issue.body || '').toLowerCase();
            const text  = title + ' ' + body;
            const labels = [];

            const rules = [
              { keywords: ['bug', 'error', 'crash', 'broken', 'fail', 'exception', 'not working'], label: 'bug' },
              { keywords: ['feature', 'enhancement', 'request', 'add support', 'would be nice', 'suggestion'], label: 'enhancement' },
              { keywords: ['doc', 'documentation', 'readme', 'typo', 'spelling', 'wiki'], label: 'documentation' },
              { keywords: ['question', 'how to', 'how do i', 'help', 'confused', 'unclear', 'explain'], label: 'question' },
              { keywords: ['performance', 'slow', 'speed', 'latency', 'memory', 'cpu', 'lag'], label: 'performance' },
              { keywords: ['security', 'vulnerability', 'cve', 'exploit', 'injection', 'attack'], label: 'security' },
              { keywords: ['workflow', 'automation', 'agentic', 'agent', 'skill', 'skills'], label: 'workflow' },
              { keywords: ['claude', 'anthropic'], label: 'claude' },
              { keywords: ['gemini', 'google ai'], label: 'gemini' },
              { keywords: ['install', 'setup', 'getting started', 'configuration', 'config'], label: 'setup' },
              { keywords: ['windows', '.exe', 'win32', 'win64'], label: 'platform: windows' },
              { keywords: ['linux', 'ubuntu', 'debian', 'appimage'], label: 'platform: linux' },
              { keywords: ['mac', 'macos', 'darwin', '.dmg'], label: 'platform: macos' },
            ];

            for (const rule of rules) {
              if (rule.keywords.some(kw => text.includes(kw))) {
                labels.push(rule.label);
              }
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: labels
              });
            }
