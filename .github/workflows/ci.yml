name: ✅ CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint + architecture rules)
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Copy-paste detection
        run: npm run cpd

      - name: Markdown lint
        run: npm run lint:md

      - name: Architecture check
        run: npm run check:arch
