name: 📦 Upload Release Asset

on:
  workflow_dispatch:

permissions: read-all

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag_name: ${{ steps.prepare.outputs.tag_name }}
      version: ${{ steps.prepare.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'latest'

      - name: Set version, tag, and create release
        id: prepare
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          BASE_VERSION="$(node ./Scripts/SetVersionByDate.mjs)"
          git fetch --tags

          COUNTER=0
          VERSION="${BASE_VERSION}.${COUNTER}"
          TAG_NAME="v${VERSION}"
          while git rev-parse "${TAG_NAME}" >/dev/null 2>&1; do
            COUNTER=$((COUNTER + 1))
            VERSION="${BASE_VERSION}.${COUNTER}"
            TAG_NAME="v${VERSION}"
          done

          echo "version=${VERSION}"   >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"

          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git diff --quiet package.json; then
            git add package.json
            git commit -m "chore(release): bump version to ${VERSION}"
            git push origin HEAD
          fi

          git tag "${TAG_NAME}"
          git push origin "${TAG_NAME}"

          PREV_TAG="$(git describe --tags --abbrev=0 "${TAG_NAME}^" 2>/dev/null || true)"
          if [ -n "${PREV_TAG}" ]; then
            CHANGES="$(git log "${PREV_TAG}..${TAG_NAME}" --no-merges --max-count=30 --pretty=format:'* %s' | grep -v '\[skip ci\]')"
          else
            CHANGES="$(git log "${TAG_NAME}" --no-merges --max-count=30 --pretty=format:'* %s' | grep -v '\[skip ci\]')"
          fi

          RELEASE_NOTES="**Change Log**
          ${CHANGES}"

          gh release create "${TAG_NAME}" \
            --title "${VERSION}" \
            --notes "${RELEASE_NOTES}"

  build-and-upload:
    needs: prepare-release
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: '--win'
          - os: ubuntu-latest
            target: '--linux'
          - os: macos-latest
            target: '--mac'
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare-release.outputs.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'latest'

      - name: Install dependencies
        run: npm install

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder ${{ matrix.target }} --publish always
