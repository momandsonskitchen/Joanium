name: 📣 Announce Release

on:
  workflow_run:
    workflows: ['📦 Upload Release Asset']
    types: [completed]

permissions: read-all

jobs:
  discord:
    name: Post to Discord
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && vars.SKIP_DISCORD != 'true' }}
    permissions:
      contents: read

    steps:
      - name: Fetch latest release info
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE=$(gh api repos/${{ github.repository }}/releases/latest)
          echo "tag=$(echo $RELEASE | jq -r '.tag_name')" >> "$GITHUB_OUTPUT"
          echo "url=$(echo $RELEASE | jq -r '.html_url')" >> "$GITHUB_OUTPUT"
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$RELEASE" | jq -r '.body' >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Send embed
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TAG: ${{ steps.release.outputs.tag }}
          URL: ${{ steps.release.outputs.url }}
          BODY: ${{ steps.release.outputs.body }}
          REPO: ${{ github.event.repository.html_url }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "DISCORD_WEBHOOK_URL not set — skipping."
            exit 0
          fi

          VERSION="${TAG#v}"

          BULLETS=$(echo "${BODY}" \
            | awk '/\*\*Change Log\*\*/{p=1;next} p && /^\*/{print;n++} n>=8{exit}')

          [ -z "${BULLETS}" ] && BULLETS="See the release notes for details."

          PAYLOAD=$(jq -n \
            --arg title "🚀 Joanium ${VERSION} released" \
            --arg url "${URL}" \
            --arg desc "${BULLETS}" \
            --arg download "https://www.joanium.com/download" \
            --arg changelog "${REPO}/blob/main/CHANGELOG.md" \
            '{
              embeds: [{
                title: $title,
                url: $url,
                color: 5793266,
                description: $desc,
                fields: [
                  { name: "Download", value: ("[joanium.com/download](" + $download + ")"), inline: true },
                  { name: "Changelog", value: ("[CHANGELOG.md](" + $changelog + ")"), inline: true }
                ],
                footer: { text: "Joanium · local-first AI desktop assistant" }
              }]
            }')

          curl -fsSL -X POST "${DISCORD_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}"

  github-discussion:
    name: Create GitHub Discussion
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      discussions: write
      contents: read

    steps:
      - name: Fetch latest release info
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE=$(gh api repos/${{ github.repository }}/releases/latest)
          echo "tag=$(echo $RELEASE | jq -r '.tag_name')" >> "$GITHUB_OUTPUT"
          echo "url=$(echo $RELEASE | jq -r '.html_url')" >> "$GITHUB_OUTPUT"
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$RELEASE" | jq -r '.body' >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_URL: ${{ steps.release.outputs.url }}
          RELEASE_BODY: ${{ steps.release.outputs.body }}
        with:
          script: |
            const tag        = process.env.RELEASE_TAG;
            const version    = tag.replace(/^v/, '');
            const body       = process.env.RELEASE_BODY || '';
            const releaseUrl = process.env.RELEASE_URL;
            const repoUrl    = context.payload.repository.html_url;

            const clMatch = body.match(/\*\*Change Log\*\*\s*\n+([\s\S]*?)(\n\n|$)/);
            const bullets = clMatch ? clMatch[1].trim() : '_See the release page for details._';

            const { repository: { id: repoId, discussionCategories: { nodes: cats } } } =
              await github.graphql(`query($o:String!,$r:String!){
                repository(owner:$o,name:$r){
                  id
                  discussionCategories(first:20){ nodes{ id name } }
                }
              }`, { o: context.repo.owner, r: context.repo.repo });

            const cat = cats.find(c => /announce/i.test(c.name))
                     || cats.find(c => /general/i.test(c.name))
                     || cats[0];
            if (!cat) { console.log('No discussion category — skipping.'); return; }

            const { createDiscussion: { discussion: { url } } } =
              await github.graphql(`mutation($rid:ID!,$cid:ID!,$title:String!,$body:String!){
                createDiscussion(input:{repositoryId:$rid,categoryId:$cid,title:$title,body:$body}){
                  discussion{ url }
                }
              }`, {
                rid:   repoId,
                cid:   cat.id,
                title: `🚀 Release ${version}`,
                body:  `## What's new in ${version}\n\n${bullets}\n\n---\n📦 [Download](https://www.joanium.com/download) · 📋 [Changelog](${repoUrl}/blob/main/CHANGELOG.md) · 🔖 [Release notes](${releaseUrl})`,
              });

            console.log(`Discussion created: ${url}`);
