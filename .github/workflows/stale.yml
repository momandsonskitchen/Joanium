name: 🗃️ Stale Issues

on:
  schedule:
    - cron: '0 0 * * 1' # Every Monday midnight UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@5bef64f19d7facfed25c9e9595c5ce4b96e9d9d5 # v9.1.0
        with:
          stale-issue-message: >
            This issue has been inactive for 30 days and is marked as stale.
            It will be closed in 7 days unless there is new activity.
          stale-pr-message: >
            This PR has been inactive for 30 days and is marked as stale.
            It will be closed in 7 days unless there is new activity.
          close-issue-message: >
            Closed due to inactivity. Feel free to reopen if this is still relevant.
          close-pr-message: >
            Closed due to inactivity. Feel free to reopen if this is still relevant.
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: 'pinned,security,roadmap'
          exempt-pr-labels: 'pinned,security'
