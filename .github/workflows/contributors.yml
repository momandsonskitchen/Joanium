name: 🤝 Auto-Update Contributors

on:
  push:
    branches: [main, master]
  schedule:
    - cron: '0 0 * * 0' # Every Sunday midnight UTC
  workflow_dispatch:

permissions: read-all

jobs:
  update-contributors:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Generate CONTRIBUTORS.md
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: contributors } = await github.rest.repos.listContributors({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            const lines = [
              `# 🤝 Contributors`,
              ``,
              `Thanks to everyone who has contributed to **Joanium**!`,
              `This file is automatically regenerated every week. 🤖`,
              ``,
              `> **Total contributors:** ${contributors.length}  `,
              `> **Last updated:** ${new Date().toUTCString()}`,
              ``,
              `---`,
              ``,
              `| | Contributor | Commits |`,
              `|---|---|---|`,
            ];

            for (const c of contributors) {
              if (c.login === 'invalid-email-address') continue;
              lines.push(
                `| <img src="${c.avatar_url}&s=32" width="32" height="32" style="border-radius:50%"/> | [@${c.login}](${c.html_url}) | ${c.contributions} |`
              );
            }

            lines.push(``);
            lines.push(`---`);
            lines.push(``);
            lines.push(`*Want your name here? Read [CONTRIBUTING.md](CONTRIBUTING.md) to get started!*`);
            lines.push(``);

            const fs = require('fs');
            fs.writeFileSync('CONTRIBUTORS.md', lines.join('\n'));
            console.log(`✅ Written ${contributors.length} contributors`);

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CONTRIBUTORS.md
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: 🤖 auto-update CONTRIBUTORS.md [skip ci]"
            git push
          fi
